name: 'Claude PR Reviewer'
description: 'AI code review powered by Claude (Anthropic) via Amazon Bedrock'
branding:
  icon: 'eye'
  color: 'orange'

inputs:
  app-private-key:
    description: 'GitHub App private key (.pem contents)'
    required: true
  claude-api-url:
    description: 'Bedrock converse endpoint URL (not required for invalidate-only runs)'
    required: false
  claude-api-token:
    description: 'Bedrock API bearer token (not required for invalidate-only runs)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Generate app token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: 2914873
        private-key: ${{ inputs.app-private-key }}

    # Fast path: on new commits, just set status to pending via curl (no Python needed)
    - name: Invalidate review status
      if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
          -d '{"state":"pending","context":"Claude Bedrock PR Review","description":"Type /claude-review to review latest changes"}'
        echo "Review status invalidated." >&2

    # Review path: post placeholder immediately via curl, then run the full review
    - name: Post placeholder comment
      id: placeholder
      if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
          -d '{"body":"<h2><img src=\"https://github.com/anthropics.png?size=36\" width=\"18\" height=\"18\" align=\"absmiddle\"> Reviewing your PR... <sub>v1.3.0</sub></h2>\n\n:hourglass_flowing_sand: Claude is analyzing your changes. A detailed review with inline comments will appear here shortly."}')
        COMMENT_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
        echo "comment-id=${COMMENT_ID}" >> "$GITHUB_OUTPUT"
        echo "Placeholder comment posted (ID: ${COMMENT_ID})." >&2

    - name: Run Claude PR review
      if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        CLAUDE_API_URL: ${{ inputs.claude-api-url }}
        CLAUDE_API_TOKEN: ${{ inputs.claude-api-token }}
        PLACEHOLDER_COMMENT_ID: ${{ steps.placeholder.outputs.comment-id }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
        python3 ${{ github.action_path }}/scripts/claude_pr_review.py \
          ${{ github.repository_owner }} \
          ${{ github.event.repository.name }} \
          ${PR_NUMBER}
