# HawkEye Reviewer — CircleCI config for GHEC managed-account repos
#
# Copy this file to .circleci/config.yml in your GHEC repo.
#
# Prerequisites:
#   1. The HawkEye GHEC GitHub App is installed on your org.
#   2. Your repo is set up as a project in CircleCI GHEC (app.circleci.com).
#   3. A shared CircleCI context "hawkeye-ghec" exists with the App credentials
#      (set up by the HawkEye admin — you don't need to configure this).
#   4. Set Claude credentials as CircleCI *project* environment variables:
#      Option A — encrypted (recommended):
#        HAWKEYE_CLAUDE_API_URL   Your Bedrock endpoint URL
#        HAWKEYE_CLAUDE_BLOB      Encrypted token (from encrypt_token.py)
#        (SERVER_PRIVATE_KEY must be in the shared context for decryption)
#      Option B — plaintext:
#        CLAUDE_API_URL           Your Bedrock endpoint URL
#        CLAUDE_API_TOKEN         Plaintext API token
#
# Note: HAWKEYE_GITHUB_API_URL is not needed — it defaults to api.github.com.
#
# Recommended: enable "Auto-cancel redundant workflows" in your CircleCI
# project settings (Advanced) to avoid duplicate reviews on rapid pushes.

version: 2.1

jobs:
  hawkeye-review:
    docker:
      - image: python:3.11-slim
    steps:
      - run:
          name: Install dependencies
          command: apt-get update -qq && apt-get install -yqq git openssl > /dev/null
      - run:
          name: Download HawkEye
          command: git clone --depth 1 https://x-access-token:${GHEC_PAT}@github.com/adobe-rnd/hawkeye-reviewer.git /hawkeye
      - run:
          name: Run review
          command: python3 /hawkeye/scripts/circleci_runner.py
          no_output_timeout: 20m

workflows:
  review:
    jobs:
      - hawkeye-review:
          context: hawkeye-ghec
          filters:
            branches:
              ignore:
                - main
                - master
                - develop
