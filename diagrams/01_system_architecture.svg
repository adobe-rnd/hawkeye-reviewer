<svg width="960" height="720" viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<defs>
  <marker id="ah-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#5b9bf5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ah-t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#2dd4a8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ah-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#f5a524" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ah-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <filter id="ds" x="-4%" y="-4%" width="108%" height="112%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
  </filter>
</defs>

<!-- Background -->
<rect width="960" height="720" rx="12" fill="#0f1117"/>

<!-- TITLE -->
<text x="480" y="44" text-anchor="middle" fill="#e2e4ea" font-size="20" font-weight="600" letter-spacing="-0.3">HawkEye Reviewer &#x2014; System architecture</text>
<text x="480" y="64" text-anchor="middle" fill="#565a6e" font-size="12">System boundaries and data flow during a review</text>

<!-- COLUMN HEADERS -->
<text x="140" y="96" text-anchor="middle" fill="#5b9bf5" font-size="10" font-weight="600" letter-spacing="1.2" opacity="0.7">GITHUB</text>
<text x="480" y="96" text-anchor="middle" fill="#2dd4a8" font-size="10" font-weight="600" letter-spacing="1.2" opacity="0.7">HAWKEYE REVIEWER</text>
<text x="820" y="96" text-anchor="middle" fill="#f5a524" font-size="10" font-weight="600" letter-spacing="1.2" opacity="0.7">AMAZON BEDROCK</text>

<!-- LEFT: GITHUB EVENTS -->
<g filter="url(#ds)">
  <rect x="30" y="114" width="220" height="150" rx="10" fill="#111827" stroke="rgba(91,155,245,0.2)" stroke-width="1"/>
</g>
<circle cx="48" cy="136" r="4" fill="#5b9bf5"/>
<text x="58" y="140" fill="#e2e4ea" font-size="13" font-weight="600">GitHub events</text>
<text x="48" y="166" fill="#8b8fa3" font-size="11.5">PR opened / reopened /</text>
<text x="48" y="182" fill="#8b8fa3" font-size="11.5">ready for review</text>
<text x="48" y="206" fill="#8b8fa3" font-size="11.5" font-family="'SF Mono', 'Fira Code', monospace" font-size="10.5">@hawkeye review</text>
<text x="148" y="206" fill="#8b8fa3" font-size="11.5"> comment</text>
<text x="48" y="230" fill="#8b8fa3" font-size="11.5">"Re-request review" button</text>

<!-- LEFT: GITHUB API -->
<g filter="url(#ds)">
  <rect x="30" y="444" width="220" height="170" rx="10" fill="#111827" stroke="rgba(91,155,245,0.2)" stroke-width="1"/>
</g>
<circle cx="48" cy="466" r="4" fill="#5b9bf5"/>
<text x="58" y="470" fill="#e2e4ea" font-size="13" font-weight="600">GitHub API</text>
<text x="168" y="470" fill="#565a6e" font-size="10.5">(read &amp; write)</text>
<text x="48" y="498" fill="#8b8fa3" font-size="11.5">PR metadata, diffs, file contents</text>
<text x="48" y="520" fill="#8b8fa3" font-size="11.5">Repo tree, variables,</text>
<text x="48" y="536" fill="#8b8fa3" font-size="11.5">existing comments</text>
<text x="48" y="564" fill="#8b8fa3" font-size="11.5">Post review comments,</text>
<text x="48" y="580" fill="#8b8fa3" font-size="11.5">commit status</text>

<!-- MIDDLE: BOUNDING BOX -->
<rect x="340" y="108" width="280" height="576" rx="14" fill="none" stroke="rgba(45,212,168,0.18)" stroke-width="1" stroke-dasharray="6 4"/>
<text x="480" y="698" text-anchor="middle" fill="#565a6e" font-size="10" letter-spacing="0.3">HawkEye Server (Azure App Service)</text>

<!-- MIDDLE: WEBHOOK SERVER -->
<g filter="url(#ds)">
  <rect x="356" y="128" width="248" height="170" rx="10" fill="rgba(45,212,168,0.06)" stroke="rgba(45,212,168,0.25)" stroke-width="1"/>
</g>
<circle cx="374" cy="150" r="4" fill="#2dd4a8"/>
<text x="384" y="154" fill="#e2e4ea" font-size="13" font-weight="600">Webhook server</text>
<text x="384" y="170" fill="#565a6e" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">webhook_server.py</text>
<text x="374" y="196" fill="#8b8fa3" font-size="11.5">Validate HMAC signature</text>
<text x="374" y="218" fill="#8b8fa3" font-size="11.5">Generate GitHub App token</text>
<text x="374" y="240" fill="#8b8fa3" font-size="11.5">Post placeholder comment</text>
<text x="374" y="262" fill="#8b8fa3" font-size="11.5">Queue review in thread pool</text>

<!-- MIDDLE: REVIEW ENGINE -->
<g filter="url(#ds)">
  <rect x="356" y="414" width="248" height="170" rx="10" fill="rgba(45,212,168,0.06)" stroke="rgba(45,212,168,0.25)" stroke-width="1"/>
</g>
<circle cx="374" cy="436" r="4" fill="#2dd4a8"/>
<text x="384" y="440" fill="#e2e4ea" font-size="13" font-weight="600">Review engine</text>
<text x="384" y="456" fill="#565a6e" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">hawkeye_pr_review.py</text>
<text x="374" y="484" fill="#8b8fa3" font-size="11.5">Fetch PR data &amp; build context</text>
<text x="374" y="506" fill="#8b8fa3" font-size="11.5">Assemble prompt</text>
<text x="374" y="528" fill="#8b8fa3" font-size="11.5">Call Claude via Bedrock</text>
<text x="374" y="550" fill="#8b8fa3" font-size="11.5">Post results to GitHub</text>

<!-- RIGHT: BEDROCK -->
<g filter="url(#ds)">
  <rect x="710" y="414" width="220" height="150" rx="10" fill="rgba(245,165,36,0.05)" stroke="rgba(245,165,36,0.2)" stroke-width="1"/>
</g>
<circle cx="728" cy="436" r="4" fill="#f5a524"/>
<text x="738" y="440" fill="#e2e4ea" font-size="13" font-weight="600">Converse API</text>
<text x="728" y="468" fill="#8b8fa3" font-size="11.5">Claude Sonnet / Opus / Haiku</text>
<text x="728" y="492" fill="#8b8fa3" font-size="11.5">1 call for small PRs</text>
<text x="728" y="516" fill="#8b8fa3" font-size="11.5">N parallel + 1 reduce</text>
<text x="728" y="532" fill="#8b8fa3" font-size="11.5">for large PRs</text>

<!-- ARROWS -->

<!-- 1: GitHub Events -> Webhook Server -->
<line x1="250" y1="189" x2="354" y2="189" stroke="#5b9bf5" stroke-width="1.5" marker-end="url(#ah-b)" opacity="0.65"/>
<text x="302" y="179" text-anchor="middle" fill="#565a6e" font-size="9.5">webhook (HMAC-signed)</text>

<!-- 2: Webhook Server -> GitHub API (dashed L-shape) -->
<path d="M356 270 L320 270 L320 474 L252 474" fill="none" stroke="#5b9bf5" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#ah-b)" opacity="0.5"/>
<text x="282" y="368" text-anchor="start" fill="#565a6e" font-size="9.5">installation</text>
<text x="282" y="382" text-anchor="start" fill="#565a6e" font-size="9.5">token request</text>

<!-- 3: Webhook Server -> Review Engine -->
<line x1="480" y1="298" x2="480" y2="412" stroke="#2dd4a8" stroke-width="1.5" marker-end="url(#ah-t)" opacity="0.65"/>
<text x="492" y="354" text-anchor="start" fill="#565a6e" font-size="9.5">trigger review</text>

<!-- 4a: Review Engine -> GitHub API -->
<line x1="356" y1="492" x2="252" y2="492" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#ah-p)" opacity="0.55"/>
<text x="304" y="484" text-anchor="middle" fill="#565a6e" font-size="9.5">read PR data</text>

<!-- 4b: GitHub API -> Review Engine -->
<line x1="252" y1="516" x2="356" y2="516" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#ah-p)" opacity="0.55"/>
<text x="304" y="534" text-anchor="middle" fill="#565a6e" font-size="9.5">write review</text>

<!-- 5: Review Engine -> Converse API -->
<line x1="604" y1="476" x2="708" y2="476" stroke="#f5a524" stroke-width="1.5" marker-end="url(#ah-a)" opacity="0.65"/>
<text x="656" y="466" text-anchor="middle" fill="#565a6e" font-size="9.5">prompt (~50k tokens)</text>

<!-- 6: Converse API -> Review Engine (dashed) -->
<line x1="708" y1="512" x2="604" y2="512" stroke="#f5a524" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#ah-a)" opacity="0.5"/>
<text x="656" y="532" text-anchor="middle" fill="#565a6e" font-size="9.5">review JSON</text>

</svg>
