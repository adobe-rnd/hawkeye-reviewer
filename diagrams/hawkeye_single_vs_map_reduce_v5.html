
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
.root{background:#0f1117;padding:36px 32px 28px;border-radius:12px;font-family:'Inter',sans-serif;overflow-x:auto}
h1{font-size:20px;font-weight:600;color:#e2e4ea;text-align:center;letter-spacing:-0.3px}
.sub{font-size:12px;color:#7d819a;text-align:center;margin-top:6px}
</style>
<div class="root">
<h1>HawkEye Reviewer — Single-pass vs map-reduce</h1>
<div class="sub">How review mode is selected based on PR size</div>

<!--
  PADDING RULES:
  - All boxes have 14px left/right padding from rect edge to text
  - 12px top padding from rect top to first text baseline
  - dot/circle inset 14px from left edge
  - text after dot starts 12px right of dot
  
  BOX TEMPLATE:
    rect x=X, text starts at X+14 (body) or X+14 for dot cx, X+26 for text after dot
    For centered text: text-anchor=middle at rect center
-->

<svg width="100%" viewBox="0 0 800 1020" font-family="Inter, sans-serif" style="margin-top:28px">
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <filter id="ds" x="-6%" y="-8%" width="112%" height="116%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
  </filter>
</defs>

<!-- ===== DECISION BOX ===== -->
<g filter="url(#ds)">
  <rect x="200" y="0" width="400" height="48" rx="24" fill="#1a1d28" stroke="rgba(245,165,36,0.3)" stroke-width="1.2"/>
</g>
<text x="400" y="29" text-anchor="middle" fill="#e2e4ea" font-size="13" font-weight="500"><tspan fill="#f5a524" font-size="14" font-weight="600">? </tspan>≥ 8 files OR ≥ 1,500 changes?</text>

<!-- Fork -->
<line x1="400" y1="48" x2="400" y2="64" stroke="#3a3d4e" stroke-width="1.2"/>
<path d="M400 64 L200 64 L200 100" fill="none" stroke="#5b9bf5" stroke-width="1.2" marker-end="url(#ah)"/>
<path d="M400 64 L600 64 L600 100" fill="none" stroke="#2dd4a8" stroke-width="1.2" marker-end="url(#ah)"/>
<text x="290" y="80" text-anchor="middle" fill="#7d819a" font-size="9.5">no</text>
<text x="510" y="80" text-anchor="middle" fill="#7d819a" font-size="9.5">yes</text>

<!-- Faint lane divider -->
<line x1="400" y1="108" x2="400" y2="882" stroke="#2a2d3a" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>


<!-- ===== LEFT LANE: SINGLE-PASS ===== -->
<text x="200" y="118" text-anchor="middle" fill="#5b9bf5" font-size="10" font-weight="600" letter-spacing="1.2">SINGLE-PASS</text>
<text x="200" y="132" text-anchor="middle" fill="#7d819a" font-size="9">&lt; 8 files and &lt; 1,500 changes</text>

<!-- Box 1: 1 Claude call  rect x=70 y=146 w=260 h=76 → pad: dot cx=86, text x=98, body x=84 -->
<g filter="url(#ds)">
  <rect x="70" y="146" width="260" height="76" rx="8" fill="rgba(245,165,36,0.06)" stroke="rgba(245,165,36,0.2)" stroke-width="1"/>
</g>
<circle cx="86" cy="170" r="3.5" fill="#f5a524"/>
<text x="98" y="174" fill="#e2e4ea" font-size="12" font-weight="500">1 Claude call</text>
<text x="84" y="196" fill="#a0a4b8" font-size="10">180K char budget</text>
<text x="84" y="212" fill="#a0a4b8" font-size="10">All changed files + full context</text>

<line x1="200" y1="222" x2="200" y2="246" stroke="#5b9bf5" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Box 2: Parse + filter  rect x=70 y=252 w=260 h=72 -->
<g filter="url(#ds)">
  <rect x="70" y="252" width="260" height="72" rx="8" fill="rgba(91,155,245,0.06)" stroke="rgba(91,155,245,0.2)" stroke-width="1"/>
</g>
<circle cx="86" cy="276" r="3.5" fill="#5b9bf5"/>
<text x="98" y="280" fill="#e2e4ea" font-size="12" font-weight="500">Parse + filter</text>
<text x="84" y="300" fill="#a0a4b8" font-size="10">Validate comments against diff lines</text>
<text x="84" y="316" fill="#a0a4b8" font-size="10">Deduplicate against existing comments</text>

<line x1="200" y1="324" x2="200" y2="348" stroke="#5b9bf5" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Box 3: Second-pass retry (dashed)  rect x=70 y=354 w=260 h=96 -->
<g filter="url(#ds)">
  <rect x="70" y="354" width="260" height="96" rx="8" fill="rgba(91,155,245,0.04)" stroke="rgba(91,155,245,0.22)" stroke-width="1" stroke-dasharray="5 3"/>
</g>
<text x="200" y="378" text-anchor="middle" fill="#e2e4ea" font-size="11.5" font-weight="500">Second-pass retry</text>
<line x1="84" y1="388" x2="316" y2="388" stroke="rgba(91,155,245,0.12)" stroke-width="0.5"/>
<text x="84" y="408" fill="#a0a4b8" font-size="10">Only if: 0 comments returned</text>
<text x="84" y="424" fill="#a0a4b8" font-size="10">AND PR has 150+ additions</text>
<text x="84" y="442" fill="#7d819a" font-size="9.5" font-style="italic">Diff-only prompt, no full source</text>

<!-- Trail to merge -->
<line x1="200" y1="450" x2="200" y2="882" stroke="#5b9bf5" stroke-width="1" opacity="0.25"/>


<!-- ===== RIGHT LANE: MAP-REDUCE ===== -->
<text x="600" y="118" text-anchor="middle" fill="#2dd4a8" font-size="10" font-weight="600" letter-spacing="1.2">MAP-REDUCE</text>
<text x="600" y="132" text-anchor="middle" fill="#7d819a" font-size="9">≥ 8 files or ≥ 1,500 changes</text>

<!-- MAP phase label -->
<text x="484" y="156" fill="#2dd4a8" font-size="9" font-weight="600" letter-spacing="1" opacity="0.65">MAP</text>

<!-- Box: Group files  rect x=470 y=164 w=260 h=64 -->
<g filter="url(#ds)">
  <rect x="470" y="164" width="260" height="64" rx="8" fill="rgba(45,212,168,0.06)" stroke="rgba(45,212,168,0.25)" stroke-width="1"/>
</g>
<circle cx="486" cy="188" r="3.5" fill="#2dd4a8"/>
<text x="498" y="192" fill="#e2e4ea" font-size="12" font-weight="500">Group files into batches</text>
<text x="484" y="214" fill="#a0a4b8" font-size="10">By directory affinity · Max 8 files per batch</text>

<line x1="600" y1="228" x2="600" y2="252" stroke="#2dd4a8" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Parallel batch boxes (stacked offset) -->
<!-- back -->
<rect x="492" y="260" width="226" height="104" rx="8" fill="#151922" stroke="rgba(245,165,36,0.12)" stroke-width="0.8" opacity="0.45"/>
<!-- mid -->
<rect x="486" y="266" width="226" height="104" rx="8" fill="#161a24" stroke="rgba(245,165,36,0.16)" stroke-width="0.8" opacity="0.65"/>
<!-- front  rect x=480 y=272 w=226 h=104 -->
<g filter="url(#ds)">
  <rect x="480" y="272" width="226" height="104" rx="8" fill="rgba(245,165,36,0.06)" stroke="rgba(245,165,36,0.2)" stroke-width="1"/>
</g>
<circle cx="496" cy="296" r="3.5" fill="#f5a524"/>
<text x="508" y="300" fill="#e2e4ea" font-size="11.5" font-weight="500">Parallel Claude calls</text>
<text x="494" y="322" fill="#a0a4b8" font-size="10">Up to 5 concurrent</text>
<text x="494" y="338" fill="#a0a4b8" font-size="10">120K char budget each</text>
<text x="494" y="358" fill="#a0a4b8" font-size="10">Each batch gets own sibling</text>
<text x="494" y="372" fill="#a0a4b8" font-size="10">files + imports context</text>
<text x="698" y="296" text-anchor="end" fill="#7d819a" font-size="8.5">batch 1</text>
<text x="704" y="284" text-anchor="end" fill="#7d819a" font-size="8" opacity="0.6">batch 2</text>
<text x="710" y="272" text-anchor="end" fill="#7d819a" font-size="8" opacity="0.4">batch 3…</text>

<line x1="600" y1="380" x2="600" y2="406" stroke="#2dd4a8" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- REDUCE phase label -->
<text x="484" y="424" fill="#2dd4a8" font-size="9" font-weight="600" letter-spacing="1" opacity="0.65">REDUCE</text>

<!-- Box: Consolidation call  rect x=470 y=434 w=260 h=114 -->
<g filter="url(#ds)">
  <rect x="470" y="434" width="260" height="114" rx="8" fill="rgba(245,165,36,0.06)" stroke="rgba(245,165,36,0.2)" stroke-width="1"/>
</g>
<circle cx="486" cy="458" r="3.5" fill="#f5a524"/>
<text x="498" y="462" fill="#e2e4ea" font-size="12" font-weight="500">1 consolidation call</text>
<text x="484" y="484" fill="#a0a4b8" font-size="10">Deduplicate across batches</text>
<text x="484" y="500" fill="#a0a4b8" font-size="10">Validate suggestions</text>
<text x="484" y="516" fill="#a0a4b8" font-size="10">Detect cross-file issues</text>
<text x="484" y="538" fill="#7d819a" font-size="9" font-style="italic">150K char diffs + 80K batch results</text>

<!-- Arrow: consolidation → reduce fallback  y=548→570 -->
<line x1="600" y1="548" x2="600" y2="570" stroke="#3a3d4e" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Reduce call failed? (dashed)  rect x=470 y=576 w=260 h=64 -->
<rect x="470" y="576" width="260" height="64" rx="8" fill="rgba(245,165,36,0.03)" stroke="rgba(245,165,36,0.18)" stroke-width="1" stroke-dasharray="5 3"/>
<text x="600" y="600" text-anchor="middle" fill="#c8cad4" font-size="11" font-weight="500">Reduce call failed?</text>
<text x="600" y="620" text-anchor="middle" fill="#a0a4b8" font-size="10">Fallback → concat all batch comments</text>

<!-- Arrow  y=640→662 -->
<line x1="600" y1="640" x2="600" y2="662" stroke="#3a3d4e" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Partial failure fallback (dashed)  rect x=470 y=668 w=260 h=76 -->
<rect x="470" y="668" width="260" height="76" rx="8" fill="rgba(45,212,168,0.03)" stroke="rgba(45,212,168,0.2)" stroke-width="1" stroke-dasharray="5 3"/>
<text x="600" y="692" text-anchor="middle" fill="#c8cad4" font-size="11" font-weight="500">Partial failure fallback</text>
<line x1="484" y1="702" x2="716" y2="702" stroke="rgba(45,212,168,0.1)" stroke-width="0.5"/>
<text x="484" y="720" fill="#a0a4b8" font-size="10">If some batches failed → post partial</text>
<text x="484" y="736" fill="#a0a4b8" font-size="10">review with warning · status: <tspan fill="#f07070">failure</tspan></text>

<!-- Arrow  y=744→768 -->
<line x1="600" y1="744" x2="600" y2="768" stroke="#2dd4a8" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Filter comments box  rect x=470 y=774 w=260 h=64 -->
<g filter="url(#ds)">
  <rect x="470" y="774" width="260" height="64" rx="8" fill="rgba(45,212,168,0.06)" stroke="rgba(45,212,168,0.2)" stroke-width="1"/>
</g>
<circle cx="486" cy="798" r="3.5" fill="#2dd4a8"/>
<text x="498" y="802" fill="#e2e4ea" font-size="12" font-weight="500">Filter comments</text>
<text x="484" y="824" fill="#a0a4b8" font-size="10">Validate against diff lines · Deduplicate</text>

<!-- Trail to merge  y=838→882 -->
<line x1="600" y1="838" x2="600" y2="882" stroke="#2dd4a8" stroke-width="1" opacity="0.25"/>


<!-- ===== MERGE ===== -->
<line x1="200" y1="882" x2="600" y2="882" stroke="#3a3d4e" stroke-width="1" opacity="0.5"/>
<line x1="400" y1="882" x2="400" y2="910" stroke="#2dd4a8" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Post review box  rect x=230 y=916 w=340 h=82 -->
<g filter="url(#ds)">
  <rect x="230" y="916" width="340" height="82" rx="10" fill="rgba(45,212,168,0.08)" stroke="rgba(45,212,168,0.35)" stroke-width="1.2"/>
</g>
<circle cx="250" cy="942" r="4" fill="#2dd4a8"/>
<text x="264" y="946" fill="#e2e4ea" font-size="13" font-weight="600">Post review</text>
<text x="248" y="968" fill="#a0a4b8" font-size="10.5">Summary comment · Inline comments</text>
<text x="248" y="988" fill="#a0a4b8" font-size="10.5">Commit status (<tspan fill="#2dd4a8">success</tspan> / <tspan fill="#f07070">error</tspan>)</text>

</svg>
</div>
