services:
  claude-pr-reviewer:
    image: claude-pr-reviewer:latest
    # Or build locally:
    # build: .
    ports:
      - "8080:8080"
    environment:
      CONFIG_FILE: /config/config.json
      MAX_CONCURRENT_REVIEWS: "4"
      # Optional: corporate CA for GHES TLS (also set per-env in config.json via ssl_ca_bundle)
      # SSL_CA_BUNDLE: /secrets/adobe-ca.crt
    volumes:
      # Multi-env config file
      - ./config.json:/config/config.json:ro
      # GitHub App private keys (one per environment)
      - ./secrets/adobernd.pem:/secrets/adobernd.pem:ro
      - ./secrets/oneadobe.pem:/secrets/oneadobe.pem:ro
      - ./secrets/ghes.pem:/secrets/ghes.pem:ro
      # Optional: corporate CA bundle for GHES
      # - ./secrets/adobe-ca.crt:/secrets/adobe-ca.crt:ro
    restart: unless-stopped
    # Route traffic through a reverse proxy (nginx, Caddy, etc.) that handles TLS
    # and forwards to port 8080.

  # --- Single-environment mode (no config file) ---
  # Uncomment to run against a single org using env vars instead of a config file.
